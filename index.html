<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Site moved</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0f1724;
      --accent:#7dd3fc;
      --muted:#9aa4b2;
      --maxw:760px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background: var(--bg);
      color: #e6eef6;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px;
    }

    .card{
      width:100%;
      max-width:var(--maxw);
      background: rgba(255,255,255,0.03);
      border-radius:16px;
      padding:40px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      text-align:center;
    }

    h1{
      margin:0 0 20px 0;
      font-size:24px;
      font-weight:600;
    }

    p{
      margin:0 0 24px 0;
      color:var(--muted);
      font-size:16px;
      line-height:1.5;
    }

    .btn{
      display:inline-block;
      padding:14px 24px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
      background: rgba(125,211,252,0.12);
      color:var(--accent);
      border:1px solid rgba(125,211,252,0.3);
      transition: background 0.2s ease;
    }

    .btn:hover{
      background: rgba(125,211,252,0.2);
    }

    .small{
      font-size:13px;
      margin-top:28px;
      color:#7f8b96;
    }
  </style>
</head>
<body>
  <main class="card">

    <h1>Our website has moved</h1>

    <p>
      We now have a new online home. For the latest updates and full content, please visit:
    </p>

    <a class="btn" href="https://www.darlianecunha.com" target="_blank" rel="noopener">
      www.darlianecunha.com
    </a>

    <div class="small">
      Thank you for your visit.
    </div>

  </main>
</body>
</html>
